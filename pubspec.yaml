name: smoothssh
description: "A zero-cloud, privacy-first SSH client for the JuiceSSH refugee."
publish_to: 'none'
version: 0.1.0+13

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # CORE TERMINAL & SSH
  xterm:
    git:
      url: https://github.com/TerminalStudio/xterm.dart.git
      ref: master
  dartssh2: ^2.16.0
  
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1
  encrypt: ^5.0.3
  crypto: ^3.0.3

  uuid: ^4.5.1
  google_fonts: ^8.0.2
  file_picker: ^10.3.10
  flutter_background: ^1.3.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  url_launcher: ^6.3.1
  
  animations: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon.png"

dependency_overrides:
  pointycastle: ^4.0.0